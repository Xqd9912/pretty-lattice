schema: spec-driven

context: |
  The user is not that familiar with JS/TS ecosystem. Use less jargons, explain more.


rules:
  proposal:
    - Stay concise, and keep the focus clear.
    - Describe goals, behavior, and boundaries more than implementation details.
    - Focus on what should be done; do not dwell on what will not be done.
  design:
    - For non-goals, include only what is necessary or easy to confuse; omit the obvious.
  tasks:
    - Keep each task at a moderate granularity; do not split tasks too finely.
    - Do not prescribe incidental implementation details unless they were explicitly discussed and decided. Leave room for judgment within the boundaries.
