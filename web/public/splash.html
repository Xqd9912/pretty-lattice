<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Pretty Lattice</title>
    <style>
      :root {
        color-scheme: light dark;
      }
      body {
        margin: 0;
        height: 100vh;
        display: grid;
        place-items: center;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", sans-serif;
        background: #f7f8f4;
        color: #22272e;
        border-radius: 12px;
        user-select: none;
      }
      main {
        text-align: center;
        padding: 0 32px;
      }
      h1 {
        margin: 0 0 6px;
        font-size: 1.05rem;
        font-weight: 600;
        letter-spacing: 0.01em;
      }
      p {
        margin: 0;
        font-size: 0.82rem;
        color: #4f5b66;
        line-height: 1.5;
      }
      p[data-role="status"][data-failed="true"] {
        color: #b42318;
      }
      .track {
        margin: 18px auto 0;
        width: 180px;
        height: 2px;
        border-radius: 2px;
        background: rgb(34 39 46 / 0.1);
        overflow: hidden;
      }
      .track[data-failed="true"] {
        display: none;
      }
      .bar {
        width: 40%;
        height: 100%;
        border-radius: 2px;
        background: #22272e;
        animation: slide 1.1s ease-in-out infinite;
      }
      @keyframes slide {
        0% {
          transform: translateX(-100%);
        }
        100% {
          transform: translateX(350%);
        }
      }
      @media (prefers-color-scheme: dark) {
        body {
          background: #16191d;
          color: #e8eaed;
        }
        p {
          color: #9aa4af;
        }
        .track {
          background: rgb(232 234 237 / 0.12);
        }
        .bar {
          background: #e8eaed;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Pretty Lattice</h1>
      <p data-role="status">Starting the analysis engine…</p>
      <div class="track" data-role="track"><div class="bar"></div></div>
    </main>
  </body>
</html>
